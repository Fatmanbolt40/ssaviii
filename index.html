<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }
        body {
            background: linear-gradient(135deg, #1a0a2e 0%, #3d1a5c 50%, #1a0a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        #gameTitle {
            color: #ff69b4;
            text-shadow: 0 0 20px #ff69b4, 0 0 40px #ff1493;
            font-size: clamp(24px, 6vw, 48px);
            margin: 10px 0;
            text-align: center;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 4/3;
        }
        #gameCanvas {
            width: 100%;
            height: 100%;
            border: 3px solid #ff69b4;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255,105,180,0.5);
        }
        #ui {
            width: 100%;
            max-width: 900px;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        .stat {
            background: rgba(255,105,180,0.2);
            border: 2px solid #ff69b4;
            border-radius: 8px;
            padding: 10px 18px;
            color: white;
            font-size: clamp(16px, 4vw, 22px);
            font-weight: bold;
        }
        .stat span {
            font-size: clamp(18px, 5vw, 28px);
            color: #ffdd00;
        }
        #kills {
            color: #ff4444 !important;
            text-shadow: 0 0 10px #ff0000;
        }
        #shopContainer {
            width: 100%;
            max-width: 900px;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .shopBtn {
            background: linear-gradient(145deg, #ff69b4, #ff1493);
            border: none;
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-size: clamp(11px, 2.8vw, 14px);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(255,20,147,0.4);
            min-width: 90px;
        }
        .shopBtn:hover, .shopBtn:active {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255,20,147,0.6);
        }
        .shopBtn.selected {
            background: linear-gradient(145deg, #00ff88, #00cc66);
            box-shadow: 0 0 20px rgba(0,255,136,0.6);
        }
        .shopBtn.sell {
            background: linear-gradient(145deg, #ff4444, #cc0000);
        }
        .shopBtn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }
        #dialogBox {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.98), rgba(0,0,0,0.9));
            border-top: 3px solid #ff69b4;
            padding: 20px;
            display: none;
            z-index: 100;
        }
        #dialogContent {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }
        #dialogPortrait {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #ff69b4;
            background: #2d1b4e;
            flex-shrink: 0;
        }
        #dialogText {
            flex: 1;
        }
        #dialogName {
            color: #ff69b4;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 5px;
        }
        #dialogMessage {
            color: white;
            font-size: 16px;
            line-height: 1.4;
        }

            border: none;
            border-radius: 8px;
            padding: 10px 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        #messageBox {

            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            border: 3px solid #ff69b4;

            padding: 30px;
            text-align: center;
            display: none;
            z-index: 100;

        // Trigger dramatic explosion effect
        function triggerExplosion(count = 5, intensity = 'medium') {
            const sizes = { small: 30, medium: 50, large: 80 };
            const size = sizes[intensity] || 50;
            
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const x = 100 + Math.random() * 600;
                    const y = 100 + Math.random() * 400;
                    createExplosion(x, y, size);
                }, i * 150);
            }
        }

        function createExplosion(x, y, size) {
            // Main explosion particles
            for (let i = 0; i < 30; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 8;
                cutsceneExplosions.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: size * (0.3 + Math.random() * 0.7),
                    life: 60 + Math.random() * 30,
                    maxLife: 90,
                    color: ['#ff4400', '#ff8800', '#ffcc00', '#ff0000', '#ffffff'][Math.floor(Math.random() * 5)],
                    type: 'fire'
                });
            }
            // Smoke particles
            for (let i = 0; i < 15; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1 + Math.random() * 3;
                cutsceneExplosions.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 2,
                    size: size * (0.5 + Math.random()),
                    life: 80 + Math.random() * 40,
                    maxLife: 120,
                    color: '#333',
                    type: 'smoke'
                });
            }
            // Screen shake
            screenShake.intensity = Math.min(screenShake.intensity + size / 5, 20);
            screenShake.duration = 20;
            // Flash
            cutsceneFlash.alpha = 0.5;
        }

        function triggerScreenShake(intensity = 10, duration = 15) {
            screenShake.intensity = intensity;
            screenShake.duration = duration;
        }

        function triggerFlash() {
            cutsceneFlash.alpha = 0.8;
        }

        function updateCutsceneEffects() {
            // Update explosions
            for (let i = cutsceneExplosions.length - 1; i >= 0; i--) {
                const p = cutsceneExplosions[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1; // gravity
                p.vx *= 0.98; // friction
                p.life--;
                if (p.life <= 0) cutsceneExplosions.splice(i, 1);
            }
            // Update shake
            if (screenShake.duration > 0) {
                screenShake.duration--;
                screenShake.intensity *= 0.9;
            }
            // Update flash
            if (cutsceneFlash.alpha > 0) {
                cutsceneFlash.alpha -= 0.05;
            }
        }

        function drawCutsceneEffects() {
            // Draw explosions
            for (const p of cutsceneExplosions) {
                const alpha = p.life / p.maxLife;
                ctx.globalAlpha = alpha;
                
                if (p.type === 'fire') {
                    // Fire glow
                    const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
                    gradient.addColorStop(0, p.color);
                    gradient.addColorStop(0.5, p.color + '88');
                    gradient.addColorStop(1, 'transparent');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                } else if (p.type === 'sparkle') {
                    // Sparkle star effect
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.life * 0.1);
                    ctx.fillStyle = p.color;
                    // Draw 4-point star
                    ctx.beginPath();
                    for (let i = 0; i < 8; i++) {
                        const angle = (i / 8) * Math.PI * 2;
                        const radius = i % 2 === 0 ? p.size : p.size * 0.4;
                        const x = Math.cos(angle) * radius;
                        const y = Math.sin(angle) * radius;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.fill();
                    // Glow
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 15;
                    ctx.fill();
                    ctx.restore();
                } else {
                    // Smoke
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
            
            // Draw flash
            if (cutsceneFlash.alpha > 0) {
                ctx.fillStyle = `rgba(255, 255, 255, ${cutsceneFlash.alpha})`;
                ctx.fillRect(-20, -20, canvas.width + 40, canvas.height + 40);

        // ============== DRAWING FUNCTIONS FOR 2D CHARACTERS ==============

        // Draw Savvy (cute anime-style archer girl)
        function drawSavvy(x, y, angle, scale = 1, selected = false) {
            ctx.save();
            ctx.translate(x, y);
            
            // Selection glow
            if (selected) {
                ctx.shadowColor = '#00ff00';
                ctx.shadowBlur = 20;
            }
            
            const s = 25 * scale;
            
            // Hair (long pink/blonde)
            ctx.fillStyle = '#ff69b4';
            ctx.beginPath();
            ctx.ellipse(0, -s*0.2, s*0.9, s*1.1, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Hair strands flowing down
            ctx.fillStyle = '#ff1493';
            ctx.beginPath();
            ctx.ellipse(-s*0.5, s*0.3, s*0.15, s*0.5, -0.3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(s*0.5, s*0.3, s*0.15, s*0.5, 0.3, 0, Math.PI * 2);
            ctx.fill();
            
            // Face
            ctx.fillStyle = '#ffe4c4';
            ctx.beginPath();
            ctx.arc(0, -s*0.1, s*0.55, 0, Math.PI * 2);
            ctx.fill();
            
            // Eyes (big cute anime eyes)
            ctx.fillStyle = '#4169e1';

        // Draw Austin (enemy blob dude)
        function drawAustin(x, y, type, health, maxHealth) {
            ctx.save();

            const enemyType = enemyTypes[type];

            ctx.fillStyle = type === 'cocaineAustin' ? '#f0f0f0' : 
                           type === 'bigAustin' ? '#2a2a6a' :

            ctx.beginPath();

            if (type === 'cocaineAustin') {

                ctx.arc(s*0.35, -s*0.15, s*0.28, 0, Math.PI * 2);

                ctx.ellipse(0, s*0.05, s*0.15, s*0.1, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.beginPath();
                ctx.ellipse(-s*0.6, -s*0.3, s*0.08, s*0.12, 0.3, 0, Math.PI * 2);
                ctx.ellipse(s*0.6, -s*0.3, s*0.08, s*0.12, -0.3, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // Regular angry face
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.ellipse(-s*0.3, -s*0.12, s*0.18, s*0.15, 0, 0, Math.PI * 2);
                ctx.ellipse(s*0.3, -s*0.12, s*0.18, s*0.15, 0, 0, Math.PI * 2);

                ctx.arc(s*0.25, -s*0.1, s*0.08, 0, Math.PI * 2);

                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(-s*0.5, -s*0.32);

                ctx.moveTo(s*0.5, -s*0.32);
                ctx.lineTo(s*0.15, -s*0.22);
                ctx.stroke();

                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, s*0.45, s*0.25, Math.PI + 0.6, -0.6);
                ctx.stroke();

            ctx.shadowBlur = 0;
            
            // Health bar
            const barWidth = s * 2.2;
            const barHeight = 7;
            const healthPercent = health / maxHealth;
            
            // Bar background
            ctx.fillStyle = '#333';
            ctx.fillRect(-barWidth/2, -s - 22, barWidth, barHeight);
            // Health fill

            ctx.strokeStyle = '#000';
            ctx.lineWidth = 3;
            const name = enemyType.boss ? '⚡ ' + enemyType.name + ' ⚡' : enemyType.name;
            ctx.strokeText(name, 0, -s - 28);
            ctx.fillText(name, 0, -s - 28);
            
            ctx.restore();
        }

        // Defender class
        class Defender {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = towerTypes[type];
                this.typeName = type;
                this.cooldown = 0;
                this.angle = 0;
                this.selected = false;
                this.kills = 0;
            }

            getSellValue() {
                return Math.floor(this.type.cost * 0.7);
            }

            update() {
                if (this.cooldown > 0) this.cooldown--;
                
                let target = null;
                let minDist = this.type.range;
                
                for (let enemy of enemies) {
                    const dist = Math.hypot(enemy.x - this.x, enemy.y - this.y);
                    if (dist < minDist) {
                        minDist = dist;
                        target = enemy;
                    }
                }

                if (target) {
                    this.angle = Math.atan2(target.y - this.y, target.x - this.x);
                    
                    if (this.cooldown <= 0) {
                        this.fire(target);
                        this.cooldown = this.type.fireRate;
                    }
                }
            }

            fire(target) {
                const numProjectiles = this.type.projectiles;
                const spreadAngle = numProjectiles > 1 ? 0.2 : 0;
                
                for (let i = 0; i < numProjectiles; i++) {
                    let angle = this.angle;
                    if (numProjectiles > 1) {
                        angle += spreadAngle * (i - (numProjectiles - 1) / 2);
                    }
                    
                    projectiles.push({
                        x: this.x,
                        y: this.y,
                        vx: Math.cos(angle) * 12,
                        vy: Math.sin(angle) * 12,
                        damage: this.type.damage,
                        color: this.type.color || '#ff69b4',
                        owner: this,
                        isSavvy: this.typeName === 'savvy'
                    });
                }
            }

            draw() {
                // Draw range when selected
                if (this.selected) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.type.range, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255,105,180,0.15)';
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(0,255,100,0.7)';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }

                // Draw character based on type
                if (this.typeName === 'savvy') {
                    drawSavvy(this.x, this.y, this.angle, 1, this.selected);
                } else if (this.typeName === 'tower') {
                    drawLoveTower(this.x, this.y, this.angle, 1, this.selected);
                } else if (this.typeName === 'fighter') {
                    drawFighter(this.x, this.y, this.angle, 1, this.selected);
                }

                // Draw name above
                ctx.font = 'bold 11px Arial';
                ctx.fillStyle = '#fff';
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 3;
                ctx.textAlign = 'center';
                ctx.strokeText(this.type.name, this.x, this.y - 45);
                ctx.fillText(this.type.name, this.x, this.y - 45);
            }
        }

        // Enemy class
        class Enemy {
            constructor(type) {
                this.type = enemyTypes[type];
                this.typeName = type;
                this.health = this.type.health;
                this.maxHealth = this.type.health;
                this.speed = this.type.speed;
                this.pathIndex = 0;
                this.x = path[0].x;
                this.y = path[0].y;
                this.dead = false;
            }

            update() {
                if (this.pathIndex >= path.length - 1) {
                    lives--;
                    updateUI();
                    this.dead = true;
                    if (lives <= 0) gameOver();
                    return;
                }

                const target = path[this.pathIndex + 1];
                const dx = target.x - this.x;
                const dy = target.y - this.y;
                const dist = Math.hypot(dx, dy);

                if (dist < this.speed) {
                    this.pathIndex++;
                } else {
                    this.x += (dx / dist) * this.speed;
                    this.y += (dy / dist) * this.speed;
                }
            }

            draw() {
                drawAustin(this.x, this.y, this.typeName, this.health, this.maxHealth);
            }

            takeDamage(damage, owner) {
                this.health -= damage;
                
                // Hit particles
                for (let i = 0; i < 6; i++) {
                    particles.push({
                        x: this.x,
                        y: this.y,
                        vx: (Math.random() - 0.5) * 6,
                        vy: (Math.random() - 0.5) * 6,
                        life: 25,
                        color: '#ff69b4',
                        size: 4
                    });
                }

                if (this.health <= 0) {
                    this.dead = true;
                    gold += this.type.reward;
                    kills++;
                    if (owner) owner.kills++;
                    updateUI();
                    
                    // Flying body animation - Austin flies away!
                    flyingBodies.push({
                        x: this.x,
                        y: this.y,
                        vx: (Math.random() - 0.5) * 8 + 3,  // Fly towards right
                        vy: -Math.random() * 12 - 8,       // Launch upward
                        rotation: 0,
                        rotationSpeed: (Math.random() - 0.5) * 0.4,
                        typeName: this.typeName,
                        scale: 1,
                        alpha: 1,
                        landed: false
                    });
                    
                    // Death explosion particles
                    for (let i = 0; i < 25; i++) {
                        particles.push({
                            x: this.x,
                            y: this.y,
                            vx: (Math.random() - 0.5) * 12,
                            vy: (Math.random() - 0.5) * 12,
                            life: 50,
                            color: this.type.color,
                            size: 6
                        });
                    }
                    // Hearts flying out
                    for (let i = 0; i < 5; i++) {
                        particles.push({
                            x: this.x,
                            y: this.y,
                            vx: (Math.random() - 0.5) * 4,
                            vy: -Math.random() * 4 - 2,
                            life: 60,
                            color: '#ff69b4',
                            size: 8,
                            heart: true
                        });
                    }
                }
            }
        }

        // Draw path
        function drawPath() {
            ctx.beginPath();
            ctx.moveTo(path[0].x, path[0].y);
            for (let i = 1; i < path.length; i++) {
                ctx.lineTo(path[i].x, path[i].y);
            }
            ctx.strokeStyle = '#6a4080';
            ctx.lineWidth = 62;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();
            ctx.strokeStyle = '#5a3070';
            ctx.lineWidth = 54;
            ctx.stroke();
            ctx.strokeStyle = '#4a2560';
            ctx.lineWidth = 46;
            ctx.stroke();
            
            // Path edge details
            ctx.strokeStyle = '#3a1a50';
            ctx.lineWidth = 40;
            ctx.stroke();
        }

        function drawDecorations() {
            // Hearts at top and bottom
            ctx.font = '28px Arial';
            for (let i = 0; i < 10; i++) {
                ctx.fillText('💕', 15 + i * 80, 28);
                ctx.fillText('💕', 15 + i * 80, 582);
            }
            
            // Sparkles in corners
            ctx.font = '20px Arial';
            ctx.fillText('✨', 10, 60);
            ctx.fillText('✨', 770, 60);
            ctx.fillText('✨', 10, 560);
            ctx.fillText('✨', 770, 560);
            
            // BAD DECISIONS sign at end of path!
            // Position based on where path ends
            const pathEnd = path[path.length - 1];
            const signX = Math.min(pathEnd.x - 100, 680);  // Near path end, but not off screen
            const signY = Math.min(Math.max(pathEnd.y - 80, 50), 450);  // Above path end
            
            // Sign post
            ctx.fillStyle = '#5a3a2a';
            ctx.fillRect(signX + 40, signY + 60, 12, 120);
            
            // Sign board
            ctx.fillStyle = '#8b4513';
            ctx.fillRect(signX - 30, signY, 160, 70);
            ctx.strokeStyle = '#5a3a2a';
            ctx.lineWidth = 4;
            ctx.strokeRect(signX - 30, signY, 160, 70);
            
            // Sign text
            ctx.fillStyle = '#ff0000';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('⚠️ BAD', signX + 50, signY + 25);
            ctx.fillText('DECISIONS', signX + 50, signY + 45);
            ctx.fillText('↓↓↓', signX + 50, signY + 62);
            ctx.textAlign = 'left';
            
            // Neon glow effect
            ctx.shadowColor = '#ff0000';
            ctx.shadowBlur = 15;
            ctx.strokeStyle = '#ff4444';
            ctx.lineWidth = 2;
            ctx.strokeRect(signX - 26, signY + 4, 152, 62);
            ctx.shadowBlur = 0;
        }

        // Flying bodies - Austin flies when killed!
        const BODY_PILE_X = 720;  // Where bodies land
        const BODY_PILE_Y = 520;  // Bottom right corner
        
        function updateFlyingBodies() {
            for (let i = flyingBodies.length - 1; i >= 0; i--) {
                const body = flyingBodies[i];
                
                // Physics
                body.vy += 0.5;  // Gravity
                body.x += body.vx;
                body.y += body.vy;
                body.rotation += body.rotationSpeed;
                
                // When body lands (goes below body pile area)
                if (body.y > BODY_PILE_Y - 20) {
                    // Add to body pile - NO LIMIT! LET THEM PILE UP FOREVER!
                    bodyPile.push({
                        x: BODY_PILE_X + (Math.random() - 0.5) * 150,
                        y: BODY_PILE_Y + (Math.random() - 0.5) * 80 - (bodyPile.length * 0.3),  // Bodies pile UP
                        rotation: body.rotation,
                        typeName: body.typeName,
                        scale: 0.7
                    });
                    flyingBodies.splice(i, 1);
                    // NO MAX! Bodies pile forever!
                }
                
                // Remove if off screen
                if (body.x > 900 || body.x < -50 || body.y > 650) {
                    // Still add to body pile counter
                    bodyPile.push({
                        x: BODY_PILE_X + (Math.random() - 0.5) * 150,
                        y: BODY_PILE_Y + (Math.random() - 0.5) * 80 - (bodyPile.length * 0.3),
                        rotation: Math.random() * Math.PI * 2,
                        typeName: body.typeName,
                        scale: 0.7
                    });
                    flyingBodies.splice(i, 1);
                    // NO MAX!
                }
            }
        }
        
        function drawFlyingBodies() {
            // Draw flying bodies (mid-air)
            for (const body of flyingBodies) {
                ctx.save();
                ctx.translate(body.x, body.y);
                ctx.rotate(body.rotation);
                ctx.globalAlpha = body.alpha;
                
                // Draw spinning Austin
                const type = enemyTypes[body.typeName];
                const size = type.size * 0.8;
                ctx.fillStyle = type.color;
                ctx.beginPath();
                ctx.arc(0, 0, size, 0, Math.PI * 2);
                ctx.fill();
                
                // Face
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(-size*0.3, -size*0.2, size*0.15, 0, Math.PI * 2);
                ctx.arc(size*0.3, -size*0.2, size*0.15, 0, Math.PI * 2);
                ctx.fill();
                
                // X eyes (dead)
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(-size*0.4, -size*0.3);
                ctx.lineTo(-size*0.2, -size*0.1);
                ctx.moveTo(-size*0.2, -size*0.3);
                ctx.lineTo(-size*0.4, -size*0.1);
                ctx.moveTo(size*0.2, -size*0.3);
                ctx.lineTo(size*0.4, -size*0.1);
                ctx.moveTo(size*0.4, -size*0.3);
                ctx.lineTo(size*0.2, -size*0.1);
                ctx.stroke();
                
                // Trail effect
                ctx.globalAlpha = 0.3;
                ctx.fillStyle = type.color;
                ctx.beginPath();
                ctx.arc(-body.vx * 2, -body.vy * 2, size * 0.6, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        function drawBodyPile() {
            // Always draw kill counter even if no bodies visible
            ctx.save();
            
            // BIG GLOWING KILL COUNT - bottom right
            ctx.textAlign = 'center';
            
            // Glow effect
            ctx.shadowColor = '#ff0000';
            ctx.shadowBlur = 20;
            
            // Label
            ctx.fillStyle = '#ff69b4';
            ctx.font = 'bold 16px Arial';
            ctx.fillText('💀 TOTAL KILLS 💀', BODY_PILE_X, BODY_PILE_Y - 70);
            
            // BIG NUMBER
            ctx.shadowBlur = 30;
            ctx.fillStyle = '#ff0000';
            ctx.font = 'bold 48px Arial';
            ctx.fillText(kills, BODY_PILE_X, BODY_PILE_Y - 25);
            
            // Bodies on screen
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#ffaaaa';
            ctx.font = 'bold 12px Arial';
            ctx.fillText(`(${bodyPile.length} bodies visible)`, BODY_PILE_X, BODY_PILE_Y - 5);
            
            ctx.textAlign = 'left';
            ctx.restore();
            
            if (bodyPile.length === 0) return;
            
            // Draw piled up bodies (small Austins)
            for (const body of bodyPile) {
                ctx.save();
                ctx.translate(body.x, body.y);
                ctx.rotate(body.rotation);
                ctx.scale(body.scale, body.scale);
                
                const type = enemyTypes[body.typeName];
                const size = type.size * 0.5;
                
                // Dead Austin
                ctx.globalAlpha = 0.8;
                ctx.fillStyle = type.color;
                ctx.beginPath();
                ctx.arc(0, 0, size, 0, Math.PI * 2);
                ctx.fill();
                
                // X eyes
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(-3, -3);
                ctx.lineTo(3, 3);
                ctx.moveTo(3, -3);
                ctx.lineTo(-3, 3);
                ctx.stroke();
                
                ctx.restore();
            }
        }

        // Projectiles - with aim assist!
        function updateProjectiles() {
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                
                // Light homing - projectiles curve toward nearest enemy
                let nearestEnemy = null;
                let nearestDist = 150;
                for (let enemy of enemies) {
                    const dist = Math.hypot(enemy.x - p.x, enemy.y - p.y);
                    if (dist < nearestDist) {
                        nearestDist = dist;
                        nearestEnemy = enemy;
                    }
                }
                if (nearestEnemy) {
                    const targetAngle = Math.atan2(nearestEnemy.y - p.y, nearestEnemy.x - p.x);
                    const currentAngle = Math.atan2(p.vy, p.vx);
                    const speed = Math.hypot(p.vx, p.vy);
                    const newAngle = currentAngle + (targetAngle - currentAngle) * 0.15; // 15% homing
                    p.vx = Math.cos(newAngle) * speed;
                    p.vy = Math.sin(newAngle) * speed;
                }
                
                p.x += p.vx;
                p.y += p.vy;

                for (let enemy of enemies) {
                    const dist = Math.hypot(enemy.x - p.x, enemy.y - p.y);
                    if (dist < enemy.type.size + 30) {  // BIGGER hitbox for easier hits!
                        enemy.takeDamage(p.damage, p.owner);
                        projectiles.splice(i, 1);
                        break;
                    }
                }

                if (p.x < -50 || p.x > 850 || p.y < -50 || p.y > 650) {
                    projectiles.splice(i, 1);
                }
            }
        }

        function drawProjectiles() {
            for (let p of projectiles) {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(Math.atan2(p.vy, p.vx));
                
                // Arrow shaft
                ctx.fillStyle = p.isSavvy ? '#ff69b4' : (p.color || '#ff1493');
                ctx.fillRect(-20, -3, 28, 6);
                
                // Arrowhead
                ctx.beginPath();
                ctx.moveTo(12, 0);
                ctx.lineTo(4, -7);
                ctx.lineTo(4, 7);
                ctx.closePath();
                ctx.fill();
                
                // Heart tip for savvy arrows
                if (p.isSavvy) {
                    ctx.fillStyle = '#ff0000';
                    ctx.beginPath();
                    ctx.moveTo(12, 0);
                    ctx.bezierCurveTo(9, -5, 6, -2, 12, 4);
                    ctx.bezierCurveTo(18, -2, 15, -5, 12, 0);
                    ctx.fill();
                }
                
                // Fletching
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.moveTo(-17, 0);
                ctx.lineTo(-24, -6);
                ctx.lineTo(-20, 0);
                ctx.lineTo(-24, 6);
                ctx.closePath();
                ctx.fill();
                
                // Glow trail
                ctx.globalAlpha = 0.3;
                ctx.fillStyle = p.isSavvy ? '#ff69b4' : p.color;
                ctx.fillRect(-35, -2, 15, 4);
                ctx.globalAlpha = 1;
                
                ctx.restore();
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                p.vy += 0.15;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function drawParticles() {
            for (let p of particles) {
                ctx.globalAlpha = p.life / 60;
                
                if (p.heart) {
                    // Draw heart particle
                    ctx.fillStyle = p.color;
                    ctx.font = (p.size * 1.5) + 'px Arial';
                    ctx.fillText('💕', p.x - p.size/2, p.y + p.size/2);
                } else {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size || 4, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                }
            }
            ctx.globalAlpha = 1;
        }

        // Dialog system
        function showDialog(dialogs) {

            dialogActive = true;
            showNextDialog();

        function showNextDialog() {
            if (dialogQueue.length === 0) {
                document.getElementById('dialogBox').style.display = 'none';

                        setTimeout(() => triggerExplosion(8, 'medium'), 400);

        // Wave system
        let spawnQueue = [];
        let spawnTimer = 0;

        function startWave() {
            if (waveActive || dialogActive) return;
            
            cancelSelection();
            wave++;
            
            // Generate new map every 3 waves!
            if (wave % 3 === 1) {
                generateNewMap();
            }
            
            // Show dialog for this wave
            let dialogs = waveDialogs[wave];
            if (!dialogs && wave > 1) {
                // Generate random dialog for waves without specific content
                dialogs = [
                    { speaker: 'savvy', text: randomWaveStartLines[Math.floor(Math.random() * randomWaveStartLines.length)] }
                ];
            }
            
            if (dialogs) {
                showDialog(dialogs);
                // Wait for dialog to finish, then start wave
                const checkDialog = setInterval(() => {
                    if (!dialogActive) {
                        clearInterval(checkDialog);
                        actuallyStartWave();
                    }
                }, 100);
            } else {
                actuallyStartWave();
            }
        }

        function actuallyStartWave() {
            waveActive = true;
            updateUI();
            
            spawnQueue = [];
            
            const numAustins = 8 + wave * 3;  // More austins!
            for (let i = 0; i < numAustins; i++) {
                spawnQueue.push('austin');
            }
            
            if (wave >= 2) {
                const numFast = Math.floor(wave / 2) * 3;  // More fast austins
                for (let i = 0; i < numFast; i++) {
                    spawnQueue.push('fastAustin');
                }
            }
            
            if (wave >= 3) {
                const numBig = Math.floor(wave / 2);  // More big austins
                for (let i = 0; i < numBig; i++) {
                    spawnQueue.push('bigAustin');
                }
            }
            
            if (wave % 4 === 0) {  // Bosses every 4 waves instead of 5
                spawnQueue.push('cocaineAustin');
            }
            
            // Shuffle spawn order
            for (let i = spawnQueue.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [spawnQueue[i], spawnQueue[j]] = [spawnQueue[j], spawnQueue[i]];
            }
            
            // Boss always comes last
            const bossIndex = spawnQueue.indexOf('cocaineAustin');
            if (bossIndex > -1) {
                spawnQueue.splice(bossIndex, 1);
                spawnQueue.push('cocaineAustin');
            }
            
            document.getElementById('startBtn').disabled = true;
        }

        function spawnEnemy() {
            if (spawnQueue.length === 0) return;
            
            spawnTimer++;
            const spawnDelay = 10 + Math.floor(Math.random() * 15);  // Random 10-25 frames between spawns
            if (spawnTimer >= spawnDelay) {
                spawnTimer = 0;
                const type = spawnQueue.shift();
                enemies.push(new Enemy(type));
            }
        }

        // Victory dialog after completing wave
        function showVictoryDialog() {
            const line = randomVictoryLines[Math.floor(Math.random() * randomVictoryLines.length)];
            showDialog([{ speaker: 'savvy', text: line }]);
        }

        // Canvas interaction
        function handleCanvasInteraction(x, y) {
            if (dialogActive) return;
            
            // Check if clicking on existing defender
            for (let def of defenders) {
                const dist = Math.hypot(def.x - x, def.y - y);
                if (dist < 40) {
                    selectDefender(def);
                    return;
                }
            }
            
            // Try to place tower
            if (selectedTower) {
                placeTower(x, y);
                return;
            }
            
            // Deselect if clicking empty space
            if (selectedDefender) {
                cancelSelection();
            }
        }

        function selectDefender(def) {
            selectedTower = null;
            document.querySelectorAll('.shopBtn').forEach(btn => btn.classList.remove('selected'));
            
            if (selectedDefender) selectedDefender.selected = false;
            
            selectedDefender = def;
            def.selected = true;
            
            document.getElementById('sellBtn').style.display = 'block';
            document.getElementById('cancelBtn').style.display = 'block';

        }

        function sellSelected() {
            if (!selectedDefender) return;
            
            gold += selectedDefender.getSellValue();
            
            const index = defenders.indexOf(selectedDefender);
            if (index > -1) defenders.splice(index, 1);

            for (let i = 0; i < 20; i++) {
                particles.push({
                    x: selectedDefender.x,

        function cancelSelection() {
            selectedTower = null;
            if (selectedDefender) {
                selectedDefender.selected = false;
                selectedDefender = null;
            }
            
            document.querySelectorAll('.shopBtn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById('sellBtn').style.display = 'none';
            document.getElementById('cancelBtn').style.display = 'none';
        }

        function placeTower(x, y) {
            if (!selectedTower) return;
            
            const type = towerTypes[selectedTower];
            if (gold < type.cost) return;
            
            // Check not too close to path
            for (let i = 0; i < path.length - 1; i++) {
                const p1 = path[i];
                const p2 = path[i + 1];
                const dist = distToSegment(x, y, p1.x, p1.y, p2.x, p2.y);
                if (dist < 55) return;
            }
            
            // Check not too close to other defenders
            for (let def of defenders) {
                if (Math.hypot(def.x - x, def.y - y) < 60) return;
            }
            
            gold -= type.cost;
            defenders.push(new Defender(x, y, selectedTower));
            updateUI();
        }
        
        // Distance from point to line segment
        function distToSegment(px, py, x1, y1, x2, y2) {
            const A = px - x1;
            const B = py - y1;
            const C = x2 - x1;
            const D = y2 - y1;
            const dot = A * C + B * D;
            const lenSq = C * C + D * D;
            let param = -1;
            if (lenSq !== 0) param = dot / lenSq;
            let xx, yy;
            if (param < 0) { xx = x1; yy = y1; }
            else if (param > 1) { xx = x2; yy = y2; }
            else { xx = x1 + param * C; yy = y1 + param * D; }
            return Math.hypot(px - xx, py - yy);
        }

        function selectTower(type) {
            if (dialogActive) return;
            
            if (selectedDefender) {
                selectedDefender.selected = false;
                selectedDefender = null;
            }
            document.getElementById('sellBtn').style.display = 'none';
            document.getElementById('cancelBtn').style.display = 'none';
            
            if (selectedTower === type) {
                selectedTower = null;
                document.querySelectorAll('.shopBtn').forEach(btn => btn.classList.remove('selected'));
            } else {
                selectedTower = type;
                document.querySelectorAll('.shopBtn').forEach(btn => btn.classList.remove('selected'));
                document.getElementById('btn_' + type).classList.add('selected');
            }
        }

        function handleCanvasClick(event) {
            event.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let clientX, clientY;
            if (event.touches) {
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            } else {
                clientX = event.clientX;
                clientY = event.clientY;
            }
            
            const x = (clientX - rect.left) * scaleX;
            const y = (clientY - rect.top) * scaleY;
            
            handleCanvasInteraction(x, y);
        }

        canvas.addEventListener('click', handleCanvasClick);
        canvas.addEventListener('touchstart', handleCanvasClick);

        function updateUI() {
            document.getElementById('gold').textContent = gold;
            document.getElementById('lives').textContent = lives;
            document.getElementById('wave').textContent = wave;
            document.getElementById('kills').textContent = kills;
        }

        // Fun encouraging messages - never a real "lose" screen!
        const endMessages = [
            { title: '✨ Amazing Run! ✨', text: 'You absolutely CRUSHED ${kills} Austins!\n\nWave ${wave} is pretty far!\n\nSavvy is SO proud of you! 💕' },
            { title: '💪 UNSTOPPABLE! 💪', text: '${kills} Austins defeated?!\n\nThat\'s INCREDIBLE!\n\nReady to beat your record? 🏆' },
            { title: '🌟 You\'re Amazing! 🌟', text: 'Wave ${wave} reached!\n${kills} bad decisions stopped!\n\nSavvy believes in you! 💖' },
            { title: '💖 Great Job! 💖', text: 'The Austins got lucky this time!\n\nBut you still took out ${kills} of them!\n\nLet\'s show them who\'s boss! 👸' },
            { title: '🎉 What a Run! 🎉', text: '${kills} Austins couldn\'t handle you!\n\nWave ${wave} is amazing!\n\nOne more round? 💕' },
            { title: '👑 Queen Energy! 👑', text: 'You made it to wave ${wave}!\n\n${kills} Austins eliminated!\n\nSlay again? 💅' }
        ];
        
        function gameOver() {
            gameRunning = false;
            const msg = endMessages[Math.floor(Math.random() * endMessages.length)];
            const finalText = msg.text.replace(/\${kills}/g, kills).replace(/\${wave}/g, wave);
            showMessage(msg.title, finalText, 'Go Again! 💘');
        }

        function showMessage(title, text, buttonText) {
            document.getElementById('msgTitle').textContent = title;
            document.getElementById('msgText').textContent = text;
            document.getElementById('messageBox').querySelector('button').textContent = buttonText;
            document.getElementById('messageBox').style.display = 'block';
        }

        function closeMessage() {
            document.getElementById('messageBox').style.display = 'none';
            if (!gameRunning) resetGame();
        }

        function resetGame() {
            gold = 150;
            lives = 20;
            wave = 0;
            kills = 0;
            defenders = [];
            enemies = [];
            projectiles = [];
            particles = [];
            flyingBodies = [];  // Reset flying bodies
            bodyPile = [];      // Reset body pile
            spawnQueue = [];
            waveActive = false;
            gameRunning = true;
            selectedTower = null;
            selectedDefender = null;
            dialogActive = false;
            dialogQueue = [];
            document.getElementById('startBtn').disabled = false;
            document.getElementById('sellBtn').style.display = 'none';
            document.getElementById('cancelBtn').style.display = 'none';
            document.getElementById('dialogBox').style.display = 'none';
            document.querySelectorAll('.shopBtn').forEach(btn => btn.classList.remove('selected'));
            updateUI();
            
            // Show intro dialog
            showDialog(waveDialogs[0]);
        }

        // Main game loop
        function gameLoop() {
            // Apply screen shake
            ctx.save();
            if (screenShake.duration > 0) {
                const shakeX = (Math.random() - 0.5) * screenShake.intensity;
                const shakeY = (Math.random() - 0.5) * screenShake.intensity;
                ctx.translate(shakeX, shakeY);
            }
            
            // Background
            ctx.fillStyle = '#2d1b4e';
            ctx.fillRect(-20, -20, canvas.width + 40, canvas.height + 40);
            
            drawDecorations();
            drawPath();
            
            // Always update cutscene effects
            updateCutsceneEffects();
            
            if (gameRunning && !dialogActive) {
                if (waveActive) spawnEnemy();
                
                defenders.forEach(d => d.update());
                enemies.forEach(e => e.update());
                updateProjectiles();
                updateParticles();
                updateFlyingBodies();  // Update flying Austin corpses
                
                enemies = enemies.filter(e => !e.dead);
                
                // Wave complete check
                if (waveActive && enemies.length === 0 && spawnQueue.length === 0) {
                    waveActive = false;
                    document.getElementById('startBtn').disabled = false;
                    gold += 35 + wave * 10;
                    updateUI();
                    showVictoryDialog();
                }
            }
            
            // Draw everything
            enemies.forEach(e => e.draw());
            defenders.forEach(d => d.draw());
            drawProjectiles();
            drawParticles();
            drawFlyingBodies();  // Draw flying Austin corpses
            drawBodyPile();      // Draw body count pile
            
            // Draw cutscene explosions and effects ON TOP
            drawCutsceneEffects();
            
            // Instructions when placing
            if (selectedTower && !dialogActive) {
                ctx.globalAlpha = 0.9;
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'center';
                ctx.fillStyle = '#fff';
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 4;
                ctx.strokeText('✨ Tap to place ' + towerTypes[selectedTower].name + ' ✨', canvas.width/2, 50);
                ctx.fillText('✨ Tap to place ' + towerTypes[selectedTower].name + ' ✨', canvas.width/2, 50);
                ctx.globalAlpha = 1;
            }
            
            // Info when defender selected
            if (selectedDefender && !dialogActive) {
                ctx.globalAlpha = 0.9;
                ctx.font = 'bold 18px Arial';
                ctx.textAlign = 'center';
                ctx.fillStyle = '#00ff88';
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 4;
                ctx.strokeText('💚 ' + selectedDefender.type.name + ' selected - Tap SELL or CANCEL 💚', canvas.width/2, 50);
                ctx.fillText('💚 ' + selectedDefender.type.name + ' selected - Tap SELL or CANCEL 💚', canvas.width/2, 50);
                ctx.globalAlpha = 1;
            }
            
            ctx.restore(); // End screen shake transform
            
            requestAnimationFrame(gameLoop);
        }

        // Initialize game - Birthday message first!
        function showBirthdayMessage() {
            const overlay = document.createElement('div');
            overlay.id = 'birthdayOverlay';
            overlay.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: linear-gradient(135deg, #ff69b4 0%, #ff1493 25%, #ff69b4 50%, #ff1493 75%, #ff69b4 100%);
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                z-index: 10000;
                animation: birthdayPulse 2s ease-in-out infinite;
            `;
            
            const style = document.createElement('style');
            style.textContent = `
                @keyframes birthdayPulse {
                    0%, 100% { background-position: 0% 50%; }
                    50% { background-position: 100% 50%; }
                }
                @keyframes heartBeat {
                    0%, 100% { transform: scale(1); }
                    25% { transform: scale(1.1); }
                    50% { transform: scale(1); }
                    75% { transform: scale(1.15); }
                }
                @keyframes floatUp {
                    0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
                    100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
                }
                @keyframes sparkle {
                    0%, 100% { opacity: 0; transform: scale(0); }
                    50% { opacity: 1; transform: scale(1); }
                }
            `;
            document.head.appendChild(style);
            
            // Floating hearts background
            for (let i = 0; i < 30; i++) {
                const heart = document.createElement('div');
                heart.innerHTML = ['💖', '💕', '💗', '💝', '✨', '🌟', '💫'][Math.floor(Math.random() * 7)];
                heart.style.cssText = `
                    position: absolute;
                    font-size: ${20 + Math.random() * 40}px;
                    left: ${Math.random() * 100}%;
                    animation: floatUp ${5 + Math.random() * 5}s linear infinite;
                    animation-delay: ${Math.random() * 5}s;
                `;
                overlay.appendChild(heart);
            }
            
            const content = document.createElement('div');
            content.style.cssText = `
                text-align: center;
                z-index: 1;
                padding: 30px;
                background: rgba(255,255,255,0.95);
                border-radius: 30px;
                box-shadow: 0 0 50px rgba(255,20,147,0.8), 0 0 100px rgba(255,105,180,0.5);
                max-width: 90%;
                animation: heartBeat 1.5s ease-in-out infinite;
            `;
            
            content.innerHTML = `
                <div style="font-size: clamp(40px, 12vw, 80px); margin-bottom: 10px;">🎂🎉💖🎉🎂</div>
                <h1 style="font-size: clamp(28px, 8vw, 60px); color: #ff1493; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); margin: 15px 0; font-family: 'Georgia', serif;">
                    Happy Birthday!
                </h1>
                <div style="font-size: clamp(50px, 15vw, 100px); animation: heartBeat 1s ease-in-out infinite;">
                    💕
                </div>
                <h2 style="font-size: clamp(24px, 6vw, 48px); color: #ff69b4; margin: 15px 0; font-family: 'Georgia', serif;">
                    I Love You, Savannah!
                </h2>
                <p style="font-size: clamp(16px, 4vw, 24px); color: #333; margin: 20px 0; line-height: 1.6;">
                    I made this game just for you! 💘<br>
                    You're my homie, you're everything on my mind! 💭<br>
                    Have the most amazing birthday! 🎂✨
                </p>
                <div style="font-size: clamp(30px, 8vw, 50px); margin: 15px 0;">
                    💖💝💖💝💖
                </div>
                <button id="birthdayBtn" style="
                    background: linear-gradient(145deg, #ff1493, #ff69b4);
                    border: none;
                    padding: 20px 50px;
                    font-size: clamp(18px, 5vw, 28px);
                    color: white;
                    border-radius: 50px;
                    cursor: pointer;
                    font-weight: bold;
                    box-shadow: 0 8px 25px rgba(255,20,147,0.5);
                    transition: all 0.3s;
                    margin-top: 10px;
                ">
                    Play My Game! 💘
                </button>
            `;
            
            overlay.appendChild(content);
            document.body.appendChild(overlay);
            
            document.getElementById('birthdayBtn').onclick = () => {
                overlay.style.transition = 'opacity 1s';
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.remove();
                    showWelcome();
                }, 1000);
            };
        }
        
        function showWelcome() {
            showMessage('💘 Welcome to Savi Defense! 💘', 
                `Defend against waves of Austins!

👸 Savvy - THE overpowered archer queen!
🏰 Love Tower - Shoots 3 love arrows
💪 Fighter - Strong melee warrior

Tap defenders to SELECT & SELL them!

Story unfolds between waves! 💕`, 
                'Start Playing!');
        }
        
        showBirthdayMessage();
        gameRunning = true;
        gameLoop();
    </script>
</body>
</html>
